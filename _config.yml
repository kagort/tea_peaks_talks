# _config.yml - рабочий и простой
title: "Чай, горы, разговоры"
description: "Личные заметки"
url: "https://kagort.github.io"
baseurl: "/tea_peaks_talks"  # имя вашего репозитория

theme: minima

# Простые настройки minima
minima:
  skin: classic
  date_format: "%d.%m.%Y"
  show_excerpts: true

# Плагины (только стандартные)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Простые permalink (убран /notes/)
permalink: /:year/:month/:day/:title.html

# Исключить лишнее
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor