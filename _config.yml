title: "Чай, горы, разговоры"
description: "Личные заметки"
url: "https://kagort.github.io"
baseurl: "/tea_peaks_talks"

theme: minima

# Простые настройки minima
minima:
  skin: classic
  date_format: "%d.%m.%Y"
  show_excerpts: true

# Плагины
plugins:
  - jekyll-feed
  - jekyll-seo-tag

permalink: /:year/:month/:day/:title.html

# Sass настройки должны быть в корне, не внутри exclude
sass:
  sass_dir: assets/css

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - assets/images/source/  # если будете хранить исходники